services:
  # ============ API GATEWAY (Node.js) ============
  api-gateway:
    build:
      context: ./services/api-gateway
      dockerfile: Dockerfile
    container_name: scoutpro-api-gateway
    ports:
      - "3001:3001"
    environment:
      - PORT=3001
      - MONGODB_URL=mongodb://root:${MONGO_ROOT_PASSWORD:-scoutpro123}@mongo:27017/scoutpro?authSource=admin
      - JWT_SECRET=${JWT_SECRET:-scoutpro-dev-CHANGE-IN-PROD}
      - NODE_ENV=development
      - TASK_WORKER_URL=http://task-worker-service:8013
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
    depends_on:
      mongo:
        condition: service_started
    volumes:
      - ./services/api-gateway/src:/app/src
    networks:
      - scoutpro-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # ============ NGINX REVERSE PROXY ============
  nginx:
    image: nginx:alpine
    container_name: scoutpro-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - ./frontend/dist:/usr/share/nginx/html:ro
    depends_on:
      api-gateway:
        condition: service_started
    networks:
      - scoutpro-network
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  # ============ CORE MICROSERVICES ============
  player-service:
    build:
      context: ./services
      dockerfile: player-service/Dockerfile
    container_name: scoutpro-player-service
    ports:
      - "28001:8000"
    environment:
      - MONGODB_URL=mongodb://root:${MONGO_ROOT_PASSWORD:-scoutpro123}@mongo:27017/scoutpro?authSource=admin
      - REDIS_URL=redis://:${REDIS_PASSWORD:-scoutpro123}@redis:6379/0
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - SERVICE_NAME=player-service
      - LOG_LEVEL=INFO
      - OPTA_API_KEY=${OPTA_API_KEY}
      - STATSBOMB_API_KEY=${STATSBOMB_API_KEY}
      - DATA_ROOT=/app/data
    depends_on:
      mongo:
        condition: service_started
      redis:
        condition: service_started
      kafka:
        condition: service_healthy
    volumes:
      - ./services/player-service:/app
      - ./services/shared:/app/shared
      - ./data:/app/data:ro
    networks:
      - scoutpro-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  team-service:
    build:
      context: ./services
      dockerfile: team-service/Dockerfile
    container_name: scoutpro-team-service
    ports:
      - "28002:8000"
    environment:
      - MONGODB_URL=mongodb://root:${MONGO_ROOT_PASSWORD:-scoutpro123}@mongo:27017/scoutpro?authSource=admin
      - REDIS_URL=redis://:${REDIS_PASSWORD:-scoutpro123}@redis:6379/0
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - SERVICE_NAME=team-service
    depends_on:
      mongo:
        condition: service_started
      redis:
        condition: service_started
      kafka:
        condition: service_healthy
    volumes:
      - ./services/team-service:/app
      - ./services/shared:/app/shared
    networks:
      - scoutpro-network
    restart: unless-stopped

  match-service:
    build:
      context: ./services
      dockerfile: match-service/Dockerfile
    container_name: scoutpro-match-service
    ports:
      - "28003:8000"
    environment:
      - MONGODB_URL=mongodb://root:${MONGO_ROOT_PASSWORD:-scoutpro123}@mongo:27017/scoutpro?authSource=admin
      - REDIS_URL=redis://:${REDIS_PASSWORD:-scoutpro123}@redis:6379/0
      - TIMESCALEDB_URL=postgresql://scoutpro:${TIMESCALE_PASSWORD:-scoutpro123}@timescaledb:5432/scoutpro
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - SERVICE_NAME=match-service
    depends_on:
      mongo:
        condition: service_started
      timescaledb:
        condition: service_started
      kafka:
        condition: service_healthy
    volumes:
      - ./services/match-service:/app
      - ./services/shared:/app/shared
    networks:
      - scoutpro-network
    restart: unless-stopped

  statistics-service:
    build:
      context: ./services
      dockerfile: statistics-service/Dockerfile
    container_name: scoutpro-statistics-service
    ports:
      - "28004:8000"
    environment:
      - TIMESCALEDB_URL=postgresql://scoutpro:${TIMESCALE_PASSWORD:-scoutpro123}@timescaledb:5432/scoutpro
      - REDIS_URL=redis://:${REDIS_PASSWORD:-scoutpro123}@redis:6379/0
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - SERVICE_NAME=statistics-service
    depends_on:
      timescaledb:
        condition: service_started
      redis:
        condition: service_started
      kafka:
        condition: service_healthy
    volumes:
      - ./services/statistics-service:/app
      - ./services/shared:/app/shared
    networks:
      - scoutpro-network
    restart: unless-stopped

  # ============ DATA PROVIDER MOCK (External) ============
  # Mimics Opta / StatsBomb HTTP APIs using local files from data/
  # Runs independently; can be swapped with real provider URLs
  data-provider:
    build:
      context: ./providers/data-provider-mock
      dockerfile: Dockerfile
    container_name: scoutpro-data-provider
    ports:
      - "7000:7000"
    environment:
      - DATA_ROOT=/app/data
      - PORT=7000
    volumes:
      - ./data:/app/data:ro
    networks:
      - scoutpro-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7000/api/health"]
      interval: 20s
      timeout: 5s
      retries: 3
      start_period: 10s

  # ============ DATA SYNC SERVICE (Internal) ============
  # Orchestrates periodic synchronization from data providers
  # Calls data-provider (mock or real) to fetch feeds
  # Transforms and bulk-upserts into MongoDB
  data-sync-service:
    build:
      context: .
      dockerfile: services/data-sync-service/Dockerfile
    container_name: scoutpro-data-sync-service
    ports:
      - "28015:8012"
    environment:
      - MONGODB_HOST=mongo
      - MONGODB_PORT=27017
      - MONGODB_DATABASE=scoutpro
      - SERVICE_NAME=data-sync-service
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - REDIS_URL=redis://:${REDIS_PASSWORD:-scoutpro123}@redis:6379

      # Data provider URLs (swap to real Opta/StatsBomb in production)
      - OPTA_BASE_URL=http://data-provider:7000
      - STATSBOMB_BASE_URL=http://data-provider:7000

      # Sync configuration
      - SYNC_PROVIDERS=opta,statsbomb
      - OPTA_SYNC_INTERVAL_MINUTES=60       # hourly squads
      - STATSBOMB_SYNC_INTERVAL_MINUTES=1440 # daily
      - OPTA_EVENT_SYNC_INTERVAL_MINUTES=15  # frequent event polling
      - COMPETITION_ID=115
      - SEASON_ID=2019

      # Optional - set dummy values for development
      - SENDGRID_API_KEY="dummy_key_development_only"
      - OPTA_API_KEY="dummy_key"
      - OPTA_WEBSOCKET_URL="ws://localhost:8080"
      - STATSBOMB_API_KEY="dummy_key"
      - FIREBASE_CREDENTIALS="{}"
    depends_on:
      mongo:
        condition: service_started
      data-provider:
        condition: service_started
    networks:
      - scoutpro-network
    restart: unless-stopped

  ml-service:
    build:
      context: ./services
      dockerfile: ml-service/Dockerfile
    container_name: scoutpro-ml-service
    ports:
      - "28005:8000"
    environment:
      - MONGODB_URL=mongodb://root:${MONGO_ROOT_PASSWORD:-scoutpro123}@mongo:27017/scoutpro?authSource=admin
      - MLFLOW_TRACKING_URI=http://mlflow:5000
      - S3_ENDPOINT=http://minio:9000
      - AWS_ACCESS_KEY_ID=${MINIO_ROOT_USER:-minioadmin}
      - AWS_SECRET_ACCESS_KEY=${MINIO_ROOT_PASSWORD:-minioadmin123}
      - SERVICE_NAME=ml-service
    depends_on:
      mongo:
        condition: service_started
      minio:
        condition: service_started
      mlflow:
        condition: service_started
    volumes:
      - ml-models:/models
      - ./services/ml-service:/app
      - ./services/shared:/app/shared
    networks:
      - scoutpro-network
    restart: unless-stopped

  live-ingestion-service:
    build:
      context: .
      dockerfile: services/live-ingestion-service/Dockerfile
    container_name: scoutpro-live-ingestion
    ports:
      - "28006:8000"
    environment:
      - OPTA_API_KEY=${OPTA_API_KEY}
      - OPTA_WEBSOCKET_URL=${OPTA_WEBSOCKET_URL}
      - STATSBOMB_API_KEY=${STATSBOMB_API_KEY}
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - REDIS_URL=redis://:${REDIS_PASSWORD:-scoutpro123}@redis:6379/0
      - SERVICE_NAME=live-ingestion-service
      - DATA_ROOT=/app/data
    depends_on:
      kafka:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - ./services/live-ingestion-service:/app
      - ./services/shared:/app/shared
      - ./data:/app/data:ro
    networks:
      - scoutpro-network
    restart: unless-stopped

  search-service:
    build:
      context: ./services
      dockerfile: search-service/Dockerfile
    container_name: scoutpro-search-service
    ports:
      - "28007:8000"
    environment:
      - ELASTICSEARCH_URL=http://elasticsearch:9200
      - REDIS_URL=redis://:${REDIS_PASSWORD:-scoutpro123}@redis:6379/0
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - SERVICE_NAME=search-service
    depends_on:
      elasticsearch:
        condition: service_started
      kafka:
        condition: service_healthy
    volumes:
      - ./services/search-service:/app
      - ./services/shared:/app/shared
    networks:
      - scoutpro-network
    restart: unless-stopped

  notification-service:
    build:
      context: ./services
      dockerfile: notification-service/Dockerfile
    container_name: scoutpro-notification-service
    ports:
      - "28008:8000"
    environment:
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - REDIS_URL=redis://:${REDIS_PASSWORD:-scoutpro123}@redis:6379/0
      - FIREBASE_CREDENTIALS=${FIREBASE_CREDENTIALS}
      - SENDGRID_API_KEY=${SENDGRID_API_KEY}
      - SERVICE_NAME=notification-service
    depends_on:
      kafka:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - ./services/notification-service:/app
      - ./services/shared:/app/shared
    networks:
      - scoutpro-network
    restart: unless-stopped

  websocket-server:
    build:
      context: ./services
      dockerfile: websocket-server/Dockerfile
    container_name: scoutpro-websocket-server
    ports:
      - "28080:8080"
    environment:
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - REDIS_URL=redis://:${REDIS_PASSWORD:-scoutpro123}@redis:6379/0
      - SERVICE_NAME=websocket-server
    depends_on:
      kafka:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - ./services/websocket-server:/app
      - ./services/shared:/app/shared
    networks:
      - scoutpro-network
    restart: unless-stopped

  report-service:
    build:
      context: ./services
      dockerfile: report-service/Dockerfile
    container_name: scoutpro-report-service
    ports:
      - "28009:8009"
    environment:
      - MONGODB_URL=mongodb://root:${MONGO_ROOT_PASSWORD:-scoutpro123}@mongo:27017/scoutpro?authSource=admin
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ACCESS_KEY=${MINIO_ROOT_USER:-minioadmin}
      - MINIO_SECRET_KEY=${MINIO_ROOT_PASSWORD:-minioadmin123}
      - SERVICE_NAME=report-service
    depends_on:
      mongo:
        condition: service_started
      minio:
        condition: service_started
    volumes:
      - ./services/report-service:/app
      - ./services/shared:/app/shared
    networks:
      - scoutpro-network
    restart: unless-stopped

  export-service:
    build:
      context: ./services
      dockerfile: export-service/Dockerfile
    container_name: scoutpro-export-service
    ports:
      - "28010:8010"
    environment:
      - MONGODB_URL=mongodb://root:${MONGO_ROOT_PASSWORD:-scoutpro123}@mongo:27017/scoutpro?authSource=admin
      - SERVICE_NAME=export-service
    depends_on:
      mongo:
        condition: service_started
    volumes:
      - ./services/export-service:/app
      - ./services/shared:/app/shared
    networks:
      - scoutpro-network
    restart: unless-stopped

  video-service:
    build:
      context: ./services
      dockerfile: video-service/Dockerfile
    container_name: scoutpro-video-service
    ports:
      - "28011:8011"
    environment:
      - MONGODB_URL=mongodb://root:${MONGO_ROOT_PASSWORD:-scoutpro123}@mongo:27017/scoutpro?authSource=admin
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ACCESS_KEY=${MINIO_ROOT_USER:-minioadmin}
      - MINIO_SECRET_KEY=${MINIO_ROOT_PASSWORD:-minioadmin123}
      - SERVICE_NAME=video-service
    depends_on:
      mongo:
        condition: service_started
      minio:
        condition: service_started
    volumes:
      - ./services/video-service:/app
      - ./services/shared:/app/shared
    networks:
      - scoutpro-network
    restart: unless-stopped

  analytics-service:
    build:
      context: ./services
      dockerfile: analytics-service/Dockerfile
    container_name: scoutpro-analytics-service
    ports:
      - "28012:8012"
    environment:
      - MONGODB_URL=mongodb://root:${MONGO_ROOT_PASSWORD:-scoutpro123}@mongo:27017/scoutpro?authSource=admin
      - REDIS_URL=redis://:${REDIS_PASSWORD:-scoutpro123}@redis:6379/0
      - TIMESCALEDB_URL=postgresql://scoutpro:${TIMESCALE_PASSWORD:-scoutpro123}@timescaledb:5432/scoutpro
      - SERVICE_NAME=analytics-service
    depends_on:
      mongo:
        condition: service_started
      redis:
        condition: service_started
      timescaledb:
        condition: service_started
    volumes:
      - ./services/analytics-service:/app
      - ./services/shared:/app/shared
    networks:
      - scoutpro-network
    restart: unless-stopped

  # ============ BACKGROUND TASK WORKER ============
  task-worker-service:
    build:
      context: ./services/task-worker-service
      dockerfile: Dockerfile
    container_name: scoutpro-task-worker
    ports:
      - "28013:8013"
    environment:
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - KAFKA_TASKS_TOPIC=tasks
      - KAFKA_TASK_COMPLETED_TOPIC=task.completed
      - KAFKA_CONSUMER_GROUP=task-worker-group
      - MONGODB_URL=mongodb://root:${MONGO_ROOT_PASSWORD:-scoutpro123}@mongo:27017/scoutpro?authSource=admin
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ACCESS_KEY=${MINIO_ROOT_USER:-minioadmin}
      - MINIO_SECRET_KEY=${MINIO_ROOT_PASSWORD:-minioadmin123}
      - MINIO_TASKS_BUCKET=task-results
      - ML_SERVICE_URL=http://ml-service:8000
      - REPORT_SERVICE_URL=http://report-service:8009
      - EXPORT_SERVICE_URL=http://export-service:8010
      - DATA_SYNC_SERVICE_URL=http://data-sync-service:8012
      - VIDEO_SERVICE_URL=http://video-service:8011
      - STATISTICS_SERVICE_URL=http://statistics-service:8000
      - TASK_WORKER_URL=http://task-worker-service:8013
    depends_on:
      kafka:
        condition: service_healthy
      mongo:
        condition: service_started
      minio:
        condition: service_started
    volumes:
      - ./services/task-worker-service:/app
    networks:
      - scoutpro-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8013/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ============ MESSAGE BROKER ============
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: scoutpro-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    volumes:
      - zookeeper-data:/var/lib/zookeeper/data
      - zookeeper-logs:/var/lib/zookeeper/log
    networks:
      - scoutpro-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "bash", "-c", "echo ruok | nc -w 2 localhost 2181 | grep imok"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: scoutpro-kafka
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
      - "9093:9093"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:9093
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_LOG_RETENTION_HOURS: 168
      KAFKA_LOG_SEGMENT_BYTES: 1073741824
    volumes:
      - kafka-data:/var/lib/kafka/data
    networks:
      - scoutpro-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: scoutpro-kafka-ui
    ports:
      - "28090:8080"
    environment:
      - KAFKA_CLUSTERS_0_NAME=scoutpro-local
      - KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS=kafka:9092
      - KAFKA_CLUSTERS_0_ZOOKEEPER=zookeeper:2181
    depends_on:
      kafka:
        condition: service_healthy
    networks:
      - scoutpro-network
    restart: unless-stopped

  # ============ DATABASES ============
  mongo:
    image: mongo:7.0
    container_name: scoutpro-mongo
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD:-scoutpro123}
      MONGO_INITDB_DATABASE: scoutpro
    volumes:
      - mongo-data:/data/db
      - mongo-config:/data/configdb
      - ./init-scripts/init-mongo.js:/docker-entrypoint-initdb.d/init-mongo.js:ro
    networks:
      - scoutpro-network
    restart: unless-stopped
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/scoutpro --quiet
      interval: 30s
      timeout: 10s
      retries: 3

  timescaledb:
    image: timescale/timescaledb:latest-pg15
    container_name: scoutpro-timescaledb
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: scoutpro
      POSTGRES_USER: scoutpro
      POSTGRES_PASSWORD: ${TIMESCALE_PASSWORD:-scoutpro123}
    volumes:
      - timescale-data:/var/lib/postgresql/data
      - ./init-scripts/init-timescale.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - scoutpro-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U scoutpro -d scoutpro"]
      interval: 30s
      timeout: 10s
      retries: 3

  redis:
    image: redis:7-alpine
    container_name: scoutpro-redis
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-scoutpro123}
    volumes:
      - redis-data:/data
    networks:
      - scoutpro-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.11.0
    container_name: scoutpro-elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - xpack.security.enrollment.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
      - cluster.name=scoutpro-search
    ports:
      - "29200:9200"
    volumes:
      - elasticsearch-data:/usr/share/elasticsearch/data
    networks:
      - scoutpro-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # ============ OBJECT STORAGE ============
  minio:
    image: minio/minio:latest
    container_name: scoutpro-minio
    ports:
      - "9002:9000"
      - "9003:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin123}
    command: server /data --console-address ":9001"
    volumes:
      - minio-data:/data
    networks:
      - scoutpro-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ============ ML OPS ============
  mlflow:
    image: ghcr.io/mlflow/mlflow:latest
    container_name: scoutpro-mlflow
    ports:
      - "5000:5000"
    environment:
      - MLFLOW_BACKEND_STORE_URI=postgresql://scoutpro:${TIMESCALE_PASSWORD:-scoutpro123}@timescaledb:5432/mlflow
      - MLFLOW_S3_ENDPOINT_URL=http://minio:9000
      - AWS_ACCESS_KEY_ID=${MINIO_ROOT_USER:-minioadmin}
      - AWS_SECRET_ACCESS_KEY=${MINIO_ROOT_PASSWORD:-minioadmin123}
    depends_on:
      timescaledb:
        condition: service_started
      minio:
        condition: service_started
    networks:
      - scoutpro-network
    restart: unless-stopped
    command: >
      mlflow server
      --backend-store-uri postgresql://scoutpro:${TIMESCALE_PASSWORD:-scoutpro123}@timescaledb:5432/mlflow
      --default-artifact-root s3://mlflow/
      --host 0.0.0.0
      --port 5000

  # ============ MONITORING ============
  prometheus:
    image: prom/prometheus:latest
    container_name: scoutpro-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
    networks:
      - scoutpro-network
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    container_name: scoutpro-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-admin123}
      - GF_INSTALL_PLUGINS=redis-datasource,kafka-datasource
      - GF_SERVER_ROOT_URL=http://localhost:3000
    volumes:
      - ./monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./monitoring/grafana/datasources:/etc/grafana/provisioning/datasources:ro
      - grafana-data:/var/lib/grafana
    depends_on:
      prometheus:
        condition: service_started
    networks:
      - scoutpro-network
    restart: unless-stopped

