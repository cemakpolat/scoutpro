global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'player-service'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['player-service:8000']

  - job_name: 'team-service'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['team-service:8000']

  - job_name: 'match-service'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['match-service:8000']

  - job_name: 'statistics-service'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['statistics-service:8000']

  - job_name: 'ml-service'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['ml-service:8000']

  - job_name: 'analytics-service'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['analytics-service:8012']

  - job_name: 'search-service'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['search-service:8000']

  - job_name: 'notification-service'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['notification-service:8000']

  - job_name: 'export-service'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['export-service:8010']

  - job_name: 'report-service'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['report-service:8009']

  - job_name: 'video-service'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['video-service:8011']

  - job_name: 'live-ingestion-service'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['live-ingestion-service:8000']

  - job_name: 'websocket-server'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['websocket-server:8080']

  - job_name: 'api-gateway'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['api-gateway:3001']
