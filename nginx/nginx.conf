# ScoutPro API Gateway - Nginx Configuration

# Upstream definitions
upstream player-service {
    server player-service:8000;
}

upstream team-service {
    server team-service:8000;
}

upstream match-service {
    server match-service:8000;
}

upstream statistics-service {
    server statistics-service:8000;
}

upstream ml-service {
    server ml-service:8000;
}

upstream live-ingestion-service {
    server live-ingestion-service:8000;
}

upstream search-service {
    server search-service:8000;
}

upstream notification-service {
    server notification-service:8000;
}

upstream websocket-server {
    server websocket-server:8080;
}

# Rate limiting zones
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=100r/s;
limit_req_zone $binary_remote_addr zone=ws_limit:10m rate=50r/s;

# Main server block
server {
    listen 80;
    server_name localhost scoutpro.local;

    # Logging
    access_log /var/log/nginx/scoutpro_access.log;
    error_log /var/log/nginx/scoutpro_error.log warn;

    # Max body size
    client_max_body_size 100M;

    # Timeouts
    proxy_connect_timeout 60s;
    proxy_send_timeout 60s;
    proxy_read_timeout 60s;

    # CORS Headers
    add_header Access-Control-Allow-Origin * always;
    add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, PATCH, OPTIONS" always;
    add_header Access-Control-Allow-Headers "DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization" always;
    add_header Access-Control-Expose-Headers "Content-Length,Content-Range" always;

    # Handle OPTIONS requests
    if ($request_method = 'OPTIONS') {
        add_header Access-Control-Allow-Origin * always;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, PATCH, OPTIONS" always;
        add_header Access-Control-Allow-Headers "DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization" always;
        add_header Access-Control-Max-Age 1728000;
        add_header Content-Type 'text/plain; charset=utf-8';
        add_header Content-Length 0;
        return 204;
    }

    # Root endpoint
    location = / {
        return 200 '{"service":"ScoutPro API Gateway","version":"2.0.0","docs":"/docs"}';
        add_header Content-Type application/json;
    }

    # Health check
    location = /health {
        return 200 '{"status":"healthy","gateway":"nginx"}';
        add_header Content-Type application/json;
    }

    # ============ Player Service ============
    # Frontend-compatible endpoint (v1)
    location /api/players {
        limit_req zone=api_limit burst=200 nodelay;

        proxy_pass http://player-service/players;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeouts
        proxy_connect_timeout 30s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;
    }

    # Backend v2 endpoint (for direct microservice access)
    location /api/v2/players {
        limit_req zone=api_limit burst=200 nodelay;

        proxy_pass http://player-service;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeouts
        proxy_connect_timeout 30s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;
    }

    # Player Service Health & Docs
    location /players/health {
        proxy_pass http://player-service/health;
        proxy_set_header Host $host;
    }

    location /players/docs {
        proxy_pass http://player-service/docs;
        proxy_set_header Host $host;
    }

    location /players/redoc {
        proxy_pass http://player-service/redoc;
        proxy_set_header Host $host;
    }

    # ============ Team Service ============
    # Frontend-compatible endpoint (v1)
    location /api/teams {
        limit_req zone=api_limit burst=200 nodelay;

        proxy_pass http://team-service/teams;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Backend v2 endpoint
    location /api/v2/teams {
        limit_req zone=api_limit burst=200 nodelay;

        proxy_pass http://team-service;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Team Service Health & Docs
    location /teams/health {
        proxy_pass http://team-service/health;
        proxy_set_header Host $host;
    }

    location /teams/docs {
        proxy_pass http://team-service/docs;
        proxy_set_header Host $host;
    }

    # ============ Match Service ============
    # Frontend-compatible endpoints (v1)
    location /api/matches {
        limit_req zone=api_limit burst=200 nodelay;

        proxy_pass http://match-service/matches;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/leagues {
        limit_req zone=api_limit burst=200 nodelay;

        proxy_pass http://match-service/leagues;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Backend v2 endpoints
    location /api/v2/matches {
        limit_req zone=api_limit burst=200 nodelay;

        proxy_pass http://match-service;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/v2/events {
        limit_req zone=api_limit burst=200 nodelay;

        proxy_pass http://match-service;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Match Service Health & Docs
    location /matches/health {
        proxy_pass http://match-service/health;
        proxy_set_header Host $host;
    }

    location /matches/docs {
        proxy_pass http://match-service/docs;
        proxy_set_header Host $host;
    }

    # ============ Statistics Service ============
    # Frontend-compatible endpoint (v1)
    location /api/analytics {
        limit_req zone=api_limit burst=200 nodelay;

        proxy_pass http://statistics-service/analytics;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Backend v2 endpoint
    location /api/v2/statistics {
        limit_req zone=api_limit burst=200 nodelay;

        proxy_pass http://statistics-service;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ============ ML Service ============
    # Frontend-compatible endpoint (v1)
    location /api/ml {
        limit_req zone=api_limit burst=50 nodelay;  # Lower rate for ML

        proxy_pass http://ml-service/ml;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Longer timeout for ML predictions
        proxy_read_timeout 120s;
    }

    # AI insights endpoint
    location /api/ai {
        limit_req zone=api_limit burst=50 nodelay;

        proxy_pass http://ml-service/ai;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_read_timeout 120s;
    }

    # Backend v2 endpoint
    location /api/v2/ml {
        limit_req zone=api_limit burst=50 nodelay;

        proxy_pass http://ml-service;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_read_timeout 120s;
    }

    # ============ Search Service ============
    # Frontend-compatible endpoint (v1)
    location /api/search {
        limit_req zone=api_limit burst=200 nodelay;

        proxy_pass http://search-service/search;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Backend v2 endpoint
    location /api/v2/search {
        limit_req zone=api_limit burst=200 nodelay;

        proxy_pass http://search-service;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ============ Notification Service ============
    # Frontend-compatible endpoint (v1)
    location /api/notifications {
        limit_req zone=api_limit burst=100 nodelay;

        proxy_pass http://notification-service/notifications;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Backend v2 endpoint
    location /api/v2/notifications {
        limit_req zone=api_limit burst=100 nodelay;

        proxy_pass http://notification-service;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ============ Market Service ============
    # Frontend market endpoints
    location /api/market {
        limit_req zone=api_limit burst=100 nodelay;

        proxy_pass http://statistics-service/market;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ============ Tactical Service ============
    # Frontend tactical endpoints
    location /api/tactical {
        limit_req zone=api_limit burst=100 nodelay;

        proxy_pass http://statistics-service/tactical;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ============ WebSocket Server ============
    location /socket.io {
        limit_req zone=ws_limit burst=100 nodelay;

        proxy_pass http://websocket-server;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket timeouts
        proxy_connect_timeout 7d;
        proxy_send_timeout 7d;
        proxy_read_timeout 7d;
    }

    # WebSocket stats endpoint
    location /ws/stats {
        proxy_pass http://websocket-server/stats;
        proxy_set_header Host $host;
    }

    # ============ Monitoring Endpoints ============
    location /metrics {
        # Aggregate metrics from all services
        # For now, redirect to Prometheus
        return 302 http://prometheus:9090;
    }

    # Prometheus targets
    location /prometheus {
        proxy_pass http://prometheus:9090;
        proxy_set_header Host $host;
    }

    # Grafana dashboards
    location /grafana {
        proxy_pass http://grafana:3000;
        proxy_set_header Host $host;
    }

    # Jaeger tracing
    location /jaeger {
        proxy_pass http://jaeger:16686;
        proxy_set_header Host $host;
    }

    # Kafka UI
    location /kafka-ui {
        proxy_pass http://kafka-ui:8080;
        proxy_set_header Host $host;
    }

    # ============ Static Files (Frontend) ============
    # Uncomment when React build is ready
    # location / {
    #     root /usr/share/nginx/html;
    #     try_files $uri $uri/ /index.html;
    # }
}

