# ScoutPro Nginx Configuration
# Serves frontend static files and proxies API calls to the Node.js gateway

worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    resolver 127.0.0.11 ipv6=off valid=10s;

    upstream api_gateway {
        server api-gateway:3001;
    }

    # Rate limiting
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=100r/s;
    limit_req_zone $binary_remote_addr zone=ws_limit:10m rate=50r/s;

    server {
        listen 80;
        server_name localhost scoutpro.local;
        set $api_gateway http://api-gateway:3001;

        access_log /var/log/nginx/scoutpro_access.log;
        error_log /var/log/nginx/scoutpro_error.log warn;

        client_max_body_size 100M;

        # CORS Headers
        add_header Access-Control-Allow-Origin * always;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, PATCH, OPTIONS" always;
        add_header Access-Control-Allow-Headers "DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization" always;
        add_header Access-Control-Expose-Headers "Content-Length,Content-Range" always;

        # Handle OPTIONS preflight
        if ($request_method = 'OPTIONS') {
            return 204;
        }

        # All API requests go to the Node.js gateway
        location /api/ {
            limit_req zone=api_limit burst=200 nodelay;
            proxy_pass $api_gateway;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_connect_timeout 60s;
            proxy_send_timeout 120s;
            proxy_read_timeout 300s;
        }

        # WebSocket Server (integrated into API Gateway)
        location /ws {
            limit_req zone=ws_limit burst=100 nodelay;
            proxy_pass $api_gateway;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_connect_timeout 7d;
            proxy_send_timeout 7d;
            proxy_read_timeout 7d;
        }

        # Health Check
        location = /health {
            proxy_pass $api_gateway/health;
            proxy_set_header Host $host;
        }

        # Frontend — serve built SPA from dist/
        location / {
            root /usr/share/nginx/html;
            index index.html;
            try_files $uri $uri/ /index.html;
        }
    }
}
